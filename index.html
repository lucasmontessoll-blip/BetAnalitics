<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="theme-color" content="#1a1d24" />
    
    <meta name="description" content="BetAnalytics PRO - A plataforma definitiva de inteligência esportiva e análise de dados para traders." />
    <meta name="author" content="Lucas Montesso Coelho" />
    
    <title>BetAnalytics PRO | Inteligência Esportiva</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #1a1d24;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      #root {
        height: 100%;
      }

      /* 🔥 Overlay PIX */
      #pix-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a1d24;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 9999;
        color: white;
      }

      #pix-overlay img {
        width: 220px;
        margin-top: 20px;
      }

      button {
        padding: 12px 20px;
        background: #00ff88;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- 🔥 PIX UI -->
    <div id="pix-overlay">
      <h2>Pagamento PIX</h2>
      <button onclick="gerarPix()">Gerar PIX</button>
      <img id="qr" />
      <p id="status"></p>
    </div>

    <script>
      let paymentId = null;

      function abrirPix() {
        document.getElementById("pix-overlay").style.display = "flex";
      }

      async function gerarPix() {
        const res = await fetch('http://localhost:3000/api/pix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: 5,
            email: "teste@test.com"
          })
        });

        const data = await res.json();

        document.getElementById("qr").src =
          "data:image/png;base64," + data.qr_base64;

        document.getElementById("status").innerText = "Aguardando pagamento...";
        
        paymentId = data.id;
      }

      setInterval(async () => {
        if (!paymentId) return;

        const res = await fetch(`http://localhost:3000/api/status/${paymentId}`);
        const data = await res.json();

        if (data.status === "approved") {
          document.getElementById("status").innerText = "✅ PAGAMENTO APROVADO!";
        }
      }, 5000);

      // 🔥 permite chamar do React
      window.abrirPix = abrirPix;
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
